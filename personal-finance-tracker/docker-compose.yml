version: "3.9"

services:

  frontend:
    build: ./frontend
    container_name: finance_frontend
    ports:
      - "3000:3000"
    depends_on:
      - backend
    networks:
      - finance_network
    restart: always

  backend:
    build: ./backend
    container_name: finance_backend
    ports:
      - "5000:5000"
    environment:
      - MONGO_URI=mongodb://mongo:27017/finance_db
    depends_on:
      - mongo
    networks:
      - finance_network
    restart: always

  mongo:
    image: mongo:6
    container_name: finance_mongo
    ports:
      - "27017:27017"
    volumes:
      - mongo_data:/data/db
    networks:
      - finance_network
    restart: always

  mongo-express:
    image: mongo-express
    container_name: finance_mongo_express
    ports:
      - "8081:8081"
    environment:
      - ME_CONFIG_MONGODB_SERVER=mongo
    depends_on:
      - mongo
    networks:
      - finance_network
    restart: always

volumes:
  mongo_data:

networks:
  finance_network: